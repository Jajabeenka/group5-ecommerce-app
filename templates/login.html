<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Bean & Brew</title>
    <!-- Relative path to CSS (adjust path if both HTML files are in the same folder) -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-body">

    <div class="login-card">
        <div class="logo-container login-logo">
            <div class="logo-placeholder">☕</div>
            <span>Jared's Coffee</span>
        </div>
        <p class="login-subtitle">Sign in to order your daily brew</p>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" class="form-input" placeholder="Enter your username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn-buy login-btn">Sign In</button>
        </form>
    </div>

    <!-- Successful Login Modal -->
    <div id="successModal" class="modal-overlay">
        <div class="modal-content success-modal-content">
            <div class="success-icon">✅</div>
            <h2>Login Successful!</h2>
            <p class="modal-subtitle">Welcome back! Redirecting to coffee shop...</p>
        </div>
    </div>

    <script>
        async function handleLogin(event) {
            event.preventDefault();

            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;

            const response = await fetch("/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    username: username,
                    password: password
                })
            });

            const data = await response.json();

            if (response.ok) {
                document.getElementById("successModal").classList.add("active");

                setTimeout(() => {
                    window.location.href = data.redirect;
                }, 1200);
            } else {
                alert(data.message);
            }
        }
    </script>
</body>
</html>
