<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Bean & Brew</title>
    <!-- Relative path to CSS (adjust path if both HTML files are in the same folder) -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-body">

    <div class="login-card">
        <div class="logo-container login-logo">
            <div class="logo-placeholder">☕</div>
            <span>Jared's Coffee</span>
        </div>
        <p class="login-subtitle">Sign in to order your daily brew</p>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" class="form-input" placeholder="Enter your username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn-buy login-btn">Sign In</button>
        </form>
    </div>

    <!-- Successful Login Modal -->
    <div id="successModal" class="modal-overlay">
        <div class="modal-content success-modal-content">
            <div class="success-icon">✅</div>
            <h2>Login Successful!</h2>
            <p class="modal-subtitle">Welcome back! Redirecting to coffee shop...</p>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault(); // Stop form from refreshing page

            // Show success modal
            const successModal = document.getElementById('successModal');
            successModal.classList.add('active');

            // Redirect directly to index.html after 1.2 seconds
            setTimeout(() => {
                window.location.href = "/dashboard";
            }, 1200);
        }
    </script>
</body>
</html>
